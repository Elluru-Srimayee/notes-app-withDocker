
services:
  app:
    build: .
    ports:
      - "8090:8080"
    networks:
      - s-network
    depends_on:
      - mysql

  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notesapp
      MYSQL_USER: sri
      MYSQL_PASSWORD: 1234
    ports:
      - "5433:3306"
    networks:
      - s-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s
    volumes:
      - mysql-data:/var/lib/mysql

networks:
  s-network:
    driver: bridge

volumes:
  mysql-data: